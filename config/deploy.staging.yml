service: bandcash
image: peterszarvashu/bandcash-staging

servers:
  - bandcash_staging

proxy:
  host: staging.bandcash.app
  app_port: 2222
  ssl: true
  healthcheck:
    path: /health
    interval: 3
    timeout: 5

registry:
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  remote: ssh://peti@bandcash_staging
  local: false

ssh:
  user: peti

volumes:
  - bandcash_staging_data:/storage

env:
  secret:
    - APP_ENV
    - HOST
    - PORT
    - URL
    - DB_PATH
    - LOG_LEVEL
    - LOG_FOLDER
    - LOG_PREFIX
    - DISABLE_RATE_LIMIT
    - SUPERADMIN_EMAIL
    - EMAIL_FROM
    - RESEND_API_KEY
    - LEMON_WEBHOOK_SECRET
    - LEMON_HOSTED_URL

accessories:
  better-stack:
    service: better-stack
    image: timberio/vector:0.42.0-debian
    host: bandcash_staging
    cmd: "--config /etc/vector/vector.toml"
    files:
      - config/observability/vector.staging.toml:/etc/vector/vector.toml:ro
    directories:
      - better-stack-staging-data:/var/lib/vector
    volumes:
      - bandcash_staging_data:/storage:ro
    env:
      secret:
        - BETTER_STACK_URI
        - BETTER_STACK_SOURCE_TOKEN
