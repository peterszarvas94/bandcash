[tools]
air = "1.64.5"
caddy = "2.9.1"
go = "1.26.0"
"go:github.com/a-h/templ/cmd/templ" = "v0.3.1001"
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = "v1.30.0"
"go:gotest.tools/gotestsum" = "v1.13.0"
"github:pressly/goose" = "3.26.0"
"github:axllent/mailpit" = "v1.27.8"
golangci-lint = "2.9.0"
ruby = "3.4.2"
"gem:kamal" = "2.10.1"

[tasks]
app = "SUPERADMIN_EMAIL=admin@bandcash.localhost air"
preflight = "go run ./cmd/devpreflight/main.go"
assets = "go run ./cmd/assets/main.go"
start = "./tmp/server"
routes = "go run ./cmd/server/main.go --routes"
test = "go test ./..."
test-pretty = "gotestsum --format testdox -- -count=1 ./..."
format = "go fmt ./..."
vet = "go vet ./..."
lint = "golangci-lint run"
lsp = 'gopls check -severity=hint $(git ls-files "*.go" ":!internal/db/*.go")'
templ = "templ generate -lazy"
sqlc = "sqlc generate"
goose-up = "goose -dir internal/db/migrations sqlite3 sqlite.db up"
goose-status = "goose -dir internal/db/migrations sqlite3 sqlite.db status"
goose-create = "goose -dir internal/db/migrations create ${name} sql"
seed = "SUPERADMIN_EMAIL=admin@bandcash.localhost go run ./cmd/seed/main.go"
mailpit = "mailpit --listen 0.0.0.0:8025 --smtp 0.0.0.0:1025"
check-versions = "go run ./cmd/checkversions"
kamal = "env -u GEM_HOME -u GEM_PATH $(mise which kamal)"
tag = "./scripts/tag.sh"
setup = "env -u GEM_HOME -u GEM_PATH $(mise which kamal) setup"
setup-staging = "env -u GEM_HOME -u GEM_PATH $(mise which kamal) setup --config-file config/deploy.staging.yml"
deploy-check = "env -u GEM_HOME -u GEM_PATH $(mise which kamal) config"
deploy = "./scripts/deploy.sh"
deploy-staging-check = "env -u GEM_HOME -u GEM_PATH $(mise which kamal) config --config-file config/deploy.staging.yml"
deploy-staging = "./scripts/deploy-staging.sh"

[tasks.build]
depends = ["assets"]
run = "go build -o tmp/server cmd/server/main.go"

[tasks.run]
run = [
  { task = "assets" },
  "SUPERADMIN_EMAIL=admin@bandcash.localhost go run ./cmd/server/main.go",
]

[tasks.check]
run = [
  { task = "format" },
  { task = "vet" },
  { task = "test" },
]

[tasks.dev]
depends = ["preflight"]
run = [{ tasks = ["app", "mailpit", "caddy"] }]

[tasks.caddy]
run = "exec caddy run --config ./Caddyfile.local"
