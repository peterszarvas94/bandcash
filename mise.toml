[tools]
air = "1.64.5"
caddy = "2.9.1"
go = "1.26.0"
"go:github.com/a-h/templ/cmd/templ" = "v0.3.1001"
"go:gotest.tools/gotestsum" = "v1.13.0"
"github:axllent/mailpit" = "v1.27.8"
golangci-lint = "2.9.0"
ruby = "3.4.2"
"gem:kamal" = "2.10.1"

[tasks]
app = "air"
preflight = "go run ./cmd/devpreflight/main.go"
assets = "go run ./cmd/assets/main.go"
start = "./tmp/server"
routes = "go run ./cmd/server --routes"
test = "go test ./..."
test-pretty = "gotestsum --format testdox -- -count=1 ./..."
format = "go fmt ./..."
vet = "go vet ./..."
lint = "golangci-lint run"
lsp = 'gopls check -severity=hint $(git ls-files "*.go" ":!internal/db/*.go")'
templ = "templ generate -lazy"
db-up = "go run ./cmd/dbmigrate/main.go -cmd=up"
db-down = "go run ./cmd/dbmigrate/main.go -cmd=down"
db-status = "go run ./cmd/dbmigrate/main.go -cmd=status"
db-create = "go run ./cmd/dbmigrate/main.go -cmd=create -name=${name}"
seed = "go run ./cmd/seed/main.go"
mailpit = "mailpit --listen 0.0.0.0:8025 --smtp 0.0.0.0:1025"
check-versions = "go run ./cmd/checkversions"
kamal = "kamal"
tag = "./scripts/tag.sh"
setup = "kamal setup"
setup-staging = "kamal setup --destination staging"
deploy-check = "kamal config"
deploy = "./scripts/deploy.sh production"
deploy-staging-check = "kamal config --destination staging"
deploy-staging = "./scripts/deploy.sh staging"

[tasks.build]
depends = ["assets"]
run = "go build -o tmp/server ./cmd/server"

[tasks.run]
run = [
  { task = "assets" },
  "go run ./cmd/server",
]

[tasks.check]
run = [
  { task = "format" },
  { task = "vet" },
  { task = "test" },
]

[tasks.dev]
depends = ["preflight"]
run = [{ tasks = ["app", "mailpit", "caddy"] }]

[tasks.caddy]
run = "exec caddy run --config ./Caddyfile.local"
