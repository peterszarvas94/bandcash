[tools]
air = "1.64.5"
go = "1.26.0"
"go:github.com/a-h/templ/cmd/templ" = "v0.3.1001"
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = "v1.30.0"
"go:gotest.tools/gotestsum" = "v1.13.0"
"github:pressly/goose" = "3.26.0"
"github:axllent/mailpit" = "v1.27.8"
"github:dmno-dev/varlock" = "0.4.1"
golangci-lint = "2.9.0"
ruby = "3.4.2"
"gem:kamal" = "2.10.1"

[tasks]
dev = "mise run dev-preflight && mise run -o prefix dev-app ::: dev-mail"
dev-app = "scripts/with_varlock_env.sh .env.local -- air"
dev-preflight = "go run ./cmd/devpreflight/main.go"
assets = "scripts/with_varlock_env.sh .env.local -- go run ./cmd/assets/main.go"
build = "scripts/with_varlock_env.sh .env.local -- sh -c 'go run ./cmd/assets/main.go && go build -o tmp/server cmd/server/main.go'"
start = "scripts/with_varlock_env.sh .env.local -- ./tmp/server"
run = "scripts/with_varlock_env.sh .env.local -- sh -c 'go run ./cmd/assets/main.go && go run ./cmd/server/main.go'"
routes = "scripts/with_varlock_env.sh .env.local -- go run ./cmd/server/main.go --routes"
test = "scripts/with_varlock_env.sh .env.local -- go test ./..."
test-pretty = "gotestsum --format testdox -- -count=1 ./..."
format = "go fmt ./..."
vet = "go vet ./..."
lint = "golangci-lint run"
lsp = 'gopls check -severity=hint $(git ls-files "*.go" ":!internal/db/*.go")'
check = "mise run format && mise run vet && mise run test"
templ = "templ generate -lazy"
sqlc = "sqlc generate"
goose-up = "goose -dir internal/db/migrations sqlite3 sqlite.db up"
goose-status = "goose -dir internal/db/migrations sqlite3 sqlite.db status"
goose-create = "goose -dir internal/db/migrations create ${name} sql"
seed = "scripts/with_varlock_env.sh .env.local -- go run ./cmd/seed/main.go"
mailpit = "mailpit --listen 0.0.0.0:8025 --smtp 0.0.0.0:1025"
dev-mail = "mailpit --listen 0.0.0.0:8025 --smtp 0.0.0.0:1025"
check-versions = "go run ./cmd/checkversions"
kamal = "scripts/with_varlock_env.sh .env.local -- env -u GEM_HOME -u GEM_PATH $(mise which kamal)"
deploy = "scripts/with_varlock_env.sh .env.production.local -- env -u GEM_HOME -u GEM_PATH $(mise which kamal) deploy"
